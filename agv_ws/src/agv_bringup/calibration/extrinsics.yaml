# Sensor Extrinsics — All transforms relative to base_footprint
# -----------------------------------------------------------------------
# STATUS: PLACEHOLDER — fill in from physical measurement or CAD
#
# Convention:
#   All transforms are expressed as [x, y, z, roll, pitch, yaw]
#   in metres and radians, child frame relative to parent frame.
#   This matches the args format of static_transform_publisher.
#
# Coordinate frames (REP-105 compliant):
#   base_footprint  — robot footprint on the ground (origin of robot)
#   base_link       — robot body centre (same x,y as footprint, z = height above ground)
#   laser_frame     — YDLiDAR X2 optical centre
#   camera_link     — RealSense D435i body
#   camera_imu_optical_frame — D435i IMU (published by realsense-ros)
#
# How to measure:
#   1. Print a 1:1 scale diagram of the AGV top plate.
#   2. Measure x/y offsets of each sensor centre from the robot centre
#      (base_footprint is at ground level, directly below robot centre).
#   3. Measure z height from ground plane.
#   4. Measure mounting angles (most sensors should be 0,0,0 if mounted flat).
#   5. For the LiDAR yaw: check if the cable exit faces forward or backward.
#      If backward, yaw = 0 is correct. If mounted reversed, yaw = pi.
#
# Verification:
#   After updating, run: rosrun tf view_frames
#   Check: odom → base_footprint → base_link → laser_frame is continuous.
#   Check: base_footprint → camera_link → camera_imu_optical_frame is continuous.
# -----------------------------------------------------------------------

calibration_date: "2026-03-15"
calibration_operator: "riyaa"
measurement_method: "cad"  # tape_measure | cad | checkerboard_optimisation

# base_footprint → base_link
# base_link is at robot body centre, raised from ground by body half-height
base_footprint_to_base_link:
  x: 0.0
  y: 0.0
  z: 0.0        # PLACEHOLDER — measure height of robot body centre from ground
  roll: 0.0
  pitch: 0.0
  yaw: 0.0

# base_footprint → laser_frame
# z=0.10m physically measured 2026-03-15. yaw=0 (X2 parallel to ground, forward-facing).
# x/y (forward/lateral offset from robot centre) still need tape-measure — pending.
base_footprint_to_laser_frame:
  x: 0.0        # pending tape-measure
  y: 0.0        # pending tape-measure
  z: 0.10       # measured 2026-03-15
  roll: 0.0
  pitch: 0.0
  yaw: 0.0      # X2 mounted parallel to ground, forward-facing

# base_footprint → camera_link
# Measured 2026-03-15: L-bracket mount, camera lens centre is 178mm in front of
# led_marker_link (-X is forward in base_link frame), same z-height as led_marker_link.
#   led_marker_link: (-0.015025, 0.002880, 0.117401) from assembly.urdf
#   offset: (-0.178, 0, +0.001) m → camera_link: (-0.193025, 0.002880, 0.118401)
# Orientation unchanged from original CAD: rpy=(π/2, -0.007906, -π/2).
# NOTE: x/y/z are derived from CAD + physical L-bracket offset. Accuracy ~5mm.
# For sub-cm accuracy, re-measure with checkerboard optimisation (STAGE_1_CALIBRATION_SOP §1e).
base_footprint_to_camera_link:
  x: -0.193025    # CAD + L-bracket offset, 2026-03-15
  y:  0.002880    # CAD, unchanged
  z:  0.118401    # CAD + 1mm z-offset, 2026-03-15
  roll:  1.570796
  pitch: -0.007906
  yaw:  -1.570796

# camera_link → camera_imu_optical_frame
# Provided by realsense-ros from factory SDK; verify against SDK output.
# Command: rostopic echo /camera/extrinsics/depth_to_imu
camera_link_to_imu:
  x: 0.0        # PLACEHOLDER — read from SDK
  y: 0.0
  z: 0.0
  roll: 0.0
  pitch: 0.0
  yaw: 0.0

# Odometry wheel calibration (feeds into odom frame accuracy)
# Update base.yaml after physical calibration tests.
odometry:
  wheel_radius_m: 0.06      # PLACEHOLDER — calibrate by driving measured distance
  wheel_base_m: 0.32        # PLACEHOLDER — calibrate by 360-degree turn test
  linear_error_1m: ~        # measured % error driving 1m straight
  angular_error_360deg: ~   # measured degree error on full 360 turn
